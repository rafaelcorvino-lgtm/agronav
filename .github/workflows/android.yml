name: Build Android APK

on:
  push:
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk nave-corvino.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nave-corvino-apk
          path: nave-corvino.apk

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app
          name: Nave Corvino — App Android
          body: |
            APK do app Nave Corvino (navegação aérea agrícola) com GPS nativo.
            Baixe **nave-corvino.apk** no celular e instale (permita "fontes desconhecidas").
          files: nave-corvino.apk
